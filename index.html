<!DOCTYPE html>
<html>
<head>
    <title>Spy Heist - Final AI</title>
    <script src="https://unpkg.com/phaser@3/dist/phaser.js"></script>
</head>
<body style="margin:0">

<script>

class Game extends Phaser.Scene {
    constructor(){ super("Game"); }

    preload(){
        this.load.image('player','https://labs.phaser.io/assets/sprites/phaser-dude.png');
        this.load.image('guard','https://labs.phaser.io/assets/sprites/robot.png');
        this.load.image('server','https://labs.phaser.io/assets/sprites/computer.png');
    }

    create(){

        this.input.keyboard.enabled = true;
        this.game.canvas.setAttribute('tabindex', '0');
        this.game.canvas.focus();
        this.input.on('pointerdown', () => this.game.canvas.focus());

        // GRID FLOOR
        for(let x=0; x<800; x+=40){
            for(let y=0; y<600; y+=40){
                this.add.rectangle(x, y, 38, 38, 0x3a3a3a).setOrigin(0);
            }
        }

        this.player = this.add.image(120,480,'player').setScale(0.5);
        this.player.setTint(0x00ffff);

        this.keys = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.UP,
            down: Phaser.Input.Keyboard.KeyCodes.DOWN,
            left: Phaser.Input.Keyboard.KeyCodes.LEFT,
            right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
            W: Phaser.Input.Keyboard.KeyCodes.W,
            A: Phaser.Input.Keyboard.KeyCodes.A,
            S: Phaser.Input.Keyboard.KeyCodes.S,
            D: Phaser.Input.Keyboard.KeyCodes.D
        });

        this.server = this.add.image(400,520,'server').setScale(0.7);

        this.alerted = false;

        // DETECTION COUNT
        this.detectCount = 0;
        this.detectText = this.add.text(50, 100, "Spotted: 0 / 5", {
            fontSize: "18px",
            color: "#ffaaaa"
        });

        // ROOMS
        this.rooms = [
            { x:150, y:150, w:250, h:200 },
            { x:400, y:150, w:200, h:200 },
            { x:650, y:150, w:250, h:200 },
            { x:650, y:450, w:250, h:250 }
        ];

        // ROOM VISUALS
        this.rooms.forEach(room=>{
            this.add.rectangle(room.x, room.y, room.w, room.h, 0x444444).setAlpha(0.4);
        });

        // WALLS
        this.walls = [
            this.add.rectangle(400,20,760,40,0xaaaaaa),
            this.add.rectangle(400,580,760,40,0xaaaaaa),
            this.add.rectangle(20,300,40,560,0xaaaaaa),
            this.add.rectangle(780,300,40,560,0xaaaaaa),
            this.add.rectangle(300,80,40,80,0xaaaaaa),
            this.add.rectangle(300,200,40,80,0xaaaaaa),
            this.add.rectangle(500,80,40,80,0xaaaaaa),
            this.add.rectangle(500,200,40,80,0xaaaaaa),
            this.add.rectangle(100,250,160,40,0xaaaaaa),
            this.add.rectangle(300,250,120,40,0xaaaaaa),
            this.add.rectangle(500,250,120,40,0xaaaaaa),
            this.add.rectangle(700,250,160,40,0xaaaaaa),
            this.add.rectangle(300,400,40,300,0xaaaaaa),
            this.add.rectangle(520,400,40,300,0xaaaaaa),
            this.add.rectangle(250,520,40,120,0xaaaaaa),
            this.add.rectangle(550,520,40,120,0xaaaaaa)
        ];

        // HIDE SPOTS
        this.hideSpots = [];
        this.rooms.forEach(room=>{
            let hx = Phaser.Math.Between(room.x-room.w/2+40, room.x+room.w/2-40);
            let hy = Phaser.Math.Between(room.y-room.h/2+40, room.y+room.h/2-40);
            this.hideSpots.push(this.add.rectangle(hx, hy, 50, 50, 0x228B22));
        });

        // GUARDS
        this.guards = [];

        this.rooms.forEach(room=>{
            let g = this.add.image(
                Phaser.Math.Between(room.x-room.w/2+40, room.x+room.w/2-40),
                Phaser.Math.Between(room.y-room.h/2+40, room.y+room.h/2-40),
                'guard'
            ).setScale(0.6);

            g.room = room;
            g.speedX = Phaser.Math.Between(-1,1) || 0.5;
            g.speedY = Phaser.Math.Between(-1,1) || 0.5;

            g.suspicion = 0;
            g.chasing = false;
            g.returning = false;
            g.hasSeenPlayer = false;

            g.startX = g.x;
            g.startY = g.y;

            g.vision = this.add.graphics();
            g.angleFacing = 0;

            this.guards.push(g);
        });

        this.suspicion = 0;

        this.bar = this.add.rectangle(100,50,200,20,0xff0000);

        this.suspicionText = this.add.text(50,70,"Suspicion: 0%",{
            fontSize:"18px",
            color:"#ffffff"
        });
    }

    update(){

        let prevX = this.player.x;
        let prevY = this.player.y;

        // MOVE
        if(this.keys.left.isDown || this.keys.A.isDown) this.player.x -= 3;
        if(this.keys.right.isDown || this.keys.D.isDown) this.player.x += 3;
        if(this.keys.up.isDown || this.keys.W.isDown) this.player.y -= 3;
        if(this.keys.down.isDown || this.keys.S.isDown) this.player.y += 3;

        this.player.x = Phaser.Math.Clamp(this.player.x,40,760);
        this.player.y = Phaser.Math.Clamp(this.player.y,40,560);

        // WALL COLLISION
        this.walls.forEach(w=>{
            let rect = new Phaser.Geom.Rectangle(w.x-w.width/2,w.y-w.height/2,w.width,w.height);
            if(Phaser.Geom.Intersects.RectangleToRectangle(this.player.getBounds(),rect)){
                this.player.x = prevX;
                this.player.y = prevY;
            }
        });

        // HIDING
        let isHidden = false;
        this.hideSpots.forEach(h=>{
            let d = Phaser.Math.Distance.Between(this.player.x,this.player.y,h.x,h.y);
            if(d < h.width/2) isHidden = true;
        });
        this.player.setAlpha(isHidden ? 0.3 : 1);

        // GUARDS
        this.guards.forEach(g=>{

            let dist = Phaser.Math.Distance.Between(this.player.x,this.player.y,g.x,g.y);

            let detectRange = this.alerted ? 220 : 140;
            let detectRate = this.alerted ? 1.4 : 0.7;

            // VISION DRAW
            g.vision.clear();
            g.vision.fillStyle(0xff0000,0.08);
            g.vision.beginPath();
            g.vision.moveTo(g.x,g.y);
            g.vision.arc(g.x,g.y,180,g.angleFacing-0.6,g.angleFacing+0.6);
            g.vision.closePath();
            g.vision.fillPath();

            // VISION CHECK
            let angleToPlayer = Phaser.Math.Angle.Between(g.x,g.y,this.player.x,this.player.y);
            let angleDiff = Phaser.Math.Angle.Wrap(angleToPlayer - g.angleFacing);
            let inVision = Math.abs(angleDiff) < 0.6;

            if(dist < detectRange && inVision && this.player.alpha === 1){

                g.suspicion += detectRate;
                this.suspicion += detectRate * 0.3;

                // DETECTION COUNT
                if(!g.hasSeenPlayer){
                    g.hasSeenPlayer = true;
                    this.detectCount++;
                }
            }

            // RESET DETECTION FLAG
            if(dist > detectRange || this.player.alpha !== 1){
                g.hasSeenPlayer = false;
            }

            g.suspicion -= 0.15;
            g.suspicion = Phaser.Math.Clamp(g.suspicion,0,100);

            if(g.suspicion > 90){
                g.chasing = true;
            }

            if(g.suspicion < 40 && g.chasing){
                g.chasing = false;
                g.returning = true;
            }

            if(g.chasing){
                g.angleFacing = Phaser.Math.Angle.Between(g.x,g.y,this.player.x,this.player.y);
                g.x += Math.cos(g.angleFacing)*2.5;
                g.y += Math.sin(g.angleFacing)*2.5;

            } else if(g.returning){

                let angle = Phaser.Math.Angle.Between(g.x,g.y,g.startX,g.startY);
                g.x += Math.cos(angle)*2;
                g.y += Math.sin(angle)*2;

                if(Phaser.Math.Distance.Between(g.x,g.y,g.startX,g.startY) < 5){
                    g.returning = false;
                }

            } else {

                g.x += g.speedX;
                g.y += g.speedY;

                g.angleFacing = Math.atan2(g.speedY,g.speedX);

                let r = g.room;

                if(g.x < r.x-r.w/2 || g.x > r.x+r.w/2) g.speedX *= -1;
                if(g.y < r.y-r.h/2 || g.y > r.y+r.h/2) g.speedY *= -1;
            }

            // TOUCH = CAUGHT
            if(Phaser.Geom.Intersects.RectangleToRectangle(this.player.getBounds(),g.getBounds())){
                alert("CAUGHT!");
                location.reload();
            }
        });

        // GLOBAL SUSPICION
        this.suspicion -= 0.1;
        this.suspicion = Phaser.Math.Clamp(this.suspicion,0,100);

        this.bar.width = this.suspicion*2;
        this.suspicionText.setText("Suspicion: "+Math.floor(this.suspicion)+"%");

        // UPDATE DETECT TEXT
        this.detectText.setText("Spotted: " + this.detectCount + " / 5");

        // LOSE CONDITION
        if(this.detectCount >= 5){
            alert("CAUGHT! Too many detections!");
            location.reload();
        }

        // ALERT SYSTEM
        if(this.suspicion > 50 && !this.alerted){
            this.alerted = true;
            this.alertText = this.add.text(300,100,"ALERT!",{fontSize:"32px",color:"#ff0000"});
        }

        if(this.suspicion < 20 && this.alerted){
            this.alerted = false;
            if(this.alertText) this.alertText.destroy();
        }

        // WIN
        let d = Phaser.Math.Distance.Between(this.player.x,this.player.y,this.server.x,this.server.y);
        if(d < 50){
            alert("MISSION COMPLETE!");
            location.reload();
        }
    }
}

new Phaser.Game({
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    scene: Game
});

</script>
</body>
</html>
