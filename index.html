<!DOCTYPE html>
<html>
<head>
    <title>Spy Heist</title>
    <script src="https://unpkg.com/phaser@3/dist/phaser.js"></script>
</head>
<body style="margin:0">

<script>

class Game extends Phaser.Scene {
    constructor(){ super("Game"); }

    preload(){
        this.load.image('player','https://labs.phaser.io/assets/sprites/phaser-dude.png');
        this.load.image('guard','https://labs.phaser.io/assets/sprites/robot.png');
        this.load.image('server','https://labs.phaser.io/assets/sprites/computer.png');
    }

    create(){

        // Focus fix
        this.input.keyboard.enabled = true;
        this.game.canvas.setAttribute('tabindex', '0');
        this.game.canvas.focus();
        this.input.on('pointerdown', () => this.game.canvas.focus());

        // Background
        this.add.rectangle(400,300,800,600,0x2d2d2d);

        // SAFE PLAYER SPAWN
        this.player = this.add.image(200,200,'player').setScale(0.5);

        // Controls
        this.keys = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.UP,
            down: Phaser.Input.Keyboard.KeyCodes.DOWN,
            left: Phaser.Input.Keyboard.KeyCodes.LEFT,
            right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
            W: Phaser.Input.Keyboard.KeyCodes.W,
            A: Phaser.Input.Keyboard.KeyCodes.A,
            S: Phaser.Input.Keyboard.KeyCodes.S,
            D: Phaser.Input.Keyboard.KeyCodes.D
        });

        // SAFE SERVER POSITION
        this.server = this.add.image(650,450,'server').setScale(0.8);

        // Walls
        this.walls = [
            this.add.rectangle(400,100,600,40,0x888888),
            this.add.rectangle(400,500,600,40,0x888888),
            this.add.rectangle(100,300,40,400,0x888888),
            this.add.rectangle(700,300,40,400,0x888888),
            this.add.rectangle(400,300,300,40,0x888888)
        ];

        // Hide spots
        this.hideSpots = [
            this.add.rectangle(200,350,60,60,0xaa7744),
            this.add.rectangle(600,250,60,60,0xaa7744)
        ];

        // Guards
        this.guards = [];
        for(let i=0;i<3;i++){
            let g = this.add.image(
                Phaser.Math.Between(200,600),
                Phaser.Math.Between(150,450),
                'guard'
            ).setScale(0.6);

            g.speedX = Phaser.Math.Between(-2,2)||1;
            g.speedY = Phaser.Math.Between(-2,2)||1;

            this.guards.push(g);
        }

        // Suspicion bar
        this.suspicion = 0;
        this.bar = this.add.rectangle(100,50,200,20,0xff0000);
    }

    update(){

        let prevX = this.player.x;
        let prevY = this.player.y;

        // Movement
        if(this.keys.left.isDown || this.keys.A.isDown) this.player.x -= 3;
        if(this.keys.right.isDown || this.keys.D.isDown) this.player.x += 3;
        if(this.keys.up.isDown || this.keys.W.isDown) this.player.y -= 3;
        if(this.keys.down.isDown || this.keys.S.isDown) this.player.y += 3;

        // KEEP PLAYER INSIDE SAFE AREA
        this.player.x = Phaser.Math.Clamp(this.player.x, 130, 670);
        this.player.y = Phaser.Math.Clamp(this.player.y, 130, 470);

        // Wall collision
        this.walls.forEach(w=>{
            let rect = new Phaser.Geom.Rectangle(
                w.x-w.width/2,
                w.y-w.height/2,
                w.width,
                w.height
            );

            if(Phaser.Geom.Intersects.RectangleToRectangle(
                this.player.getBounds(),rect
            )){
                this.player.x = prevX;
                this.player.y = prevY;
            }
        });

        // Hiding
        let isHidden = false;
        this.hideSpots.forEach(h=>{
            let dist = Phaser.Math.Distance.Between(
                this.player.x,this.player.y,h.x,h.y
            );
            if(dist < 70) isHidden = true;
        });

        this.player.setAlpha(isHidden ? 0.3 : 1);

        // Guards
        this.guards.forEach(g=>{
            g.x += g.speedX;
            g.y += g.speedY;

            if(g.x<150||g.x>650) g.speedX*=-1;
            if(g.y<150||g.y>450) g.speedY*=-1;

            let dist = Phaser.Math.Distance.Between(
                this.player.x,this.player.y,g.x,g.y
            );

            if(dist < 150 && !isHidden){
                this.suspicion += 0.5;
            }
        });

        // Suspicion
        this.suspicion -= 0.1;
        this.suspicion = Phaser.Math.Clamp(this.suspicion,0,100);
        this.bar.width = this.suspicion * 2;

        if(this.suspicion >= 100){
            alert("CAUGHT!");
            location.reload();
        }

        // Reach server
        let d = Phaser.Math.Distance.Between(
            this.player.x,this.player.y,
            this.server.x,this.server.y
        );

        if(d < 50){
            alert("MISSION COMPLETE!");
            location.reload();
        }
    }
}

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    scene: Game
};

new Phaser.Game(config);

</script>

</body>
</html>
