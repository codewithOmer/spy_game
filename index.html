<!DOCTYPE html>
<html>
<head>
    <title>Spy Heist - Security Room</title>
    <script src="https://unpkg.com/phaser@3/dist/phaser.js"></script>
</head>
<body style="margin:0">

<script>

class Game extends Phaser.Scene {
    constructor(){ super("Game"); }

    preload(){
        this.load.image('player','https://labs.phaser.io/assets/sprites/phaser-dude.png');
        this.load.image('guard','https://labs.phaser.io/assets/sprites/robot.png');
        this.load.image('server','https://labs.phaser.io/assets/sprites/computer.png');
    }

    create(){

        // Focus fix
        this.input.keyboard.enabled = true;
        this.game.canvas.setAttribute('tabindex', '0');
        this.game.canvas.focus();
        this.input.on('pointerdown', () => this.game.canvas.focus());

        // Background
        this.add.rectangle(400,300,800,600,0x2d2d2d);

        // 🧍 PLAYER (Lobby spawn)
        this.player = this.add.image(120,480,'player').setScale(0.5);

        //  Controls
        this.keys = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.UP,
            down: Phaser.Input.Keyboard.KeyCodes.DOWN,
            left: Phaser.Input.Keyboard.KeyCodes.LEFT,
            right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
            W: Phaser.Input.Keyboard.KeyCodes.W,
            A: Phaser.Input.Keyboard.KeyCodes.A,
            S: Phaser.Input.Keyboard.KeyCodes.S,
            D: Phaser.Input.Keyboard.KeyCodes.D
        });

        //  SECURITY ROOM OBJECTIVE (bottom center)
        this.server = this.add.image(400,520,'server').setScale(0.7);

        //  WALLS (MAP)
        this.walls = [

            // Outer walls
            this.add.rectangle(400,20,760,40,0x888888),
            this.add.rectangle(400,580,760,40,0x888888),
            this.add.rectangle(20,300,40,560,0x888888),
            this.add.rectangle(780,300,40,560,0x888888),

            // Top rooms dividers
            this.add.rectangle(300,140,40,200,0x888888),
            this.add.rectangle(500,140,40,200,0x888888),

            // Hallway divider
            this.add.rectangle(400,250,600,40,0x888888),

            // Room 4 right wall
            this.add.rectangle(600,400,40,300,0x888888),

            // Lobby divider (left bottom)
            this.add.rectangle(250,400,40,300,0x888888),

            // Security room walls (bottom center box)
            this.add.rectangle(400,450,300,40,0x888888), // top
            this.add.rectangle(250,520,40,120,0x888888), // left
            this.add.rectangle(550,520,40,120,0x888888)  // right
        ];

        //  DOOR GAPS (visual only)
        this.add.rectangle(200,250,60,20,0x00ff00); // lobby → hall
        this.add.rectangle(400,250,60,20,0x00ff00); // hall center
        this.add.rectangle(600,250,60,20,0x00ff00); // hall → room 4
        this.add.rectangle(400,450,80,20,0x00ff00); // security room entrance

        //  Hiding spots
        this.hideSpots = [
            this.add.rectangle(180,500,60,60,0xaa7744),
            this.add.rectangle(650,420,60,60,0xaa7744),
            this.add.rectangle(600,120,60,60,0xaa7744)
        ];

        //  Guards
        this.guards = [];
        for(let i=0;i<3;i++){
            let g = this.add.image(
                Phaser.Math.Between(200,650),
                Phaser.Math.Between(100,450),
                'guard'
            ).setScale(0.6);

            g.speedX = Phaser.Math.Between(-2,2)||1;
            g.speedY = Phaser.Math.Between(-2,2)||1;

            this.guards.push(g);
        }

        // Suspicion bar
        this.suspicion = 0;
        this.bar = this.add.rectangle(100,50,200,20,0xff0000);
    }

    update(){

        let prevX = this.player.x;
        let prevY = this.player.y;

        // Movement
        if(this.keys.left.isDown || this.keys.A.isDown) this.player.x -= 3;
        if(this.keys.right.isDown || this.keys.D.isDown) this.player.x += 3;
        if(this.keys.up.isDown || this.keys.W.isDown) this.player.y -= 3;
        if(this.keys.down.isDown || this.keys.S.isDown) this.player.y += 3;

        // Stay in bounds
        this.player.x = Phaser.Math.Clamp(this.player.x, 40, 760);
        this.player.y = Phaser.Math.Clamp(this.player.y, 40, 560);

        // Wall collision
        this.walls.forEach(w=>{
            let rect = new Phaser.Geom.Rectangle(
                w.x-w.width/2,
                w.y-w.height/2,
                w.width,
                w.height
            );

            if(Phaser.Geom.Intersects.RectangleToRectangle(
                this.player.getBounds(),rect
            )){
                this.player.x = prevX;
                this.player.y = prevY;
            }
        });

        // Hiding
        let isHidden = false;
        this.hideSpots.forEach(h=>{
            let dist = Phaser.Math.Distance.Between(
                this.player.x,this.player.y,h.x,h.y
            );
            if(dist < 70) isHidden = true;
        });

        this.player.setAlpha(isHidden ? 0.3 : 1);

        // Guards
        this.guards.forEach(g=>{
            g.x += g.speedX;
            g.y += g.speedY;

            if(g.x<100||g.x>700) g.speedX*=-1;
            if(g.y<100||g.y>500) g.speedY*=-1;

            let dist = Phaser.Math.Distance.Between(
                this.player.x,this.player.y,g.x,g.y
            );

            if(dist < 150 && !isHidden){
                this.suspicion += 0.5;
            }
        });

        // Suspicion system
        this.suspicion -= 0.1;
        this.suspicion = Phaser.Math.Clamp(this.suspicion,0,100);
        this.bar.width = this.suspicion * 2;

        if(this.suspicion >= 100){
            alert("CAUGHT!");
            location.reload();
        }

        // Reach Security Room Server
        let d = Phaser.Math.Distance.Between(
            this.player.x,this.player.y,
            this.server.x,this.server.y
        );

        if(d < 50){
            alert("SECURITY HACKED! MISSION COMPLETE");
            location.reload();
        }
    }
}

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    scene: Game
};

new Phaser.Game(config);

</script>

</body>
</html>
